<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Broking — Offshore Transition & US Treaty Staffing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --orange: #D04A02;
    --orange-light: #E8712A;
    --dark: #1A1A1A;
    --charcoal: #2D2D2D;
    --gray-500: #6B6B6B;
    --gray-300: #B0B0B0;
    --gray-100: #F0F0F0;
    --white: #FFFFFF;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .gate {
    width: 100%;
    max-width: 420px;
    padding: 32px;
    text-align: center;
  }

  .gate-brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gray-300);
    margin-bottom: 48px;
  }
  .gate-brand span { color: var(--orange); }

  .gate-lock {
    width: 56px; height: 56px;
    margin: 0 auto 24px;
    border: 2px solid var(--orange);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate-lock svg {
    width: 24px; height: 24px;
    fill: none; stroke: var(--orange);
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .gate h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .gate p {
    font-size: 13px;
    color: var(--gray-300);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group input {
    width: 100%;
    padding: 14px 16px;
    font-family: var(--font);
    font-size: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input::placeholder { color: var(--gray-500); }
  .input-group input:focus { border-color: var(--orange); }

  .btn {
    width: 100%;
    padding: 14px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--orange-light); }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error {
    margin-top: 16px;
    font-size: 12px;
    color: #E85454;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error.visible { opacity: 1; }

  .loading {
    display: none;
    margin-top: 16px;
    font-size: 12px;
    color: var(--gray-300);
  }
  .loading.visible { display: block; }

  .footer-note {
    margin-top: 48px;
    font-size: 10px;
    color: var(--gray-500);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-brand"><span>pw</span>c | Advisory</div>

  <div class="gate-lock">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
  </div>

  <h1>Protected Document</h1>
  <p>This proposal requires a password to access.<br>Enter the password provided by your PwC team.</p>

  <form id="authForm" autocomplete="off">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Enter password" autofocus autocomplete="off" />
    </div>
    <button type="submit" class="btn" id="submitBtn">Access Proposal</button>
  </form>

  <div class="error" id="error">Incorrect password. Please try again.</div>
  <div class="loading" id="loading">Decrypting document&hellip;</div>

  <p class="footer-note">
    &copy; 2026 PricewaterhouseCoopers Advisory Services LLC. Confidential.
  </p>
</div>

<script>
(async function() {
  const form = document.getElementById('authForm');
  const pwdInput = document.getElementById('pwd');
  const errorEl = document.getElementById('error');
  const loadingEl = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');

  let payload = null;

  async function loadPayload() {
    const resp = await fetch('encrypted_payload.json');
    payload = await resp.json();
  }
  loadPayload();

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function decrypt(password) {
    if (!payload) throw new Error('Payload not loaded');

    const salt = b64ToBytes(payload.salt);
    const iv = b64ToBytes(payload.iv);
    const ct = b64ToBytes(payload.ct);

    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      ct
    );
    return new TextDecoder().decode(decrypted);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = pwdInput.value;
    if (!password) return;

    errorEl.classList.remove('visible');
    loadingEl.classList.add('visible');
    submitBtn.disabled = true;

    try {
      const html = await decrypt(password);

      document.open();
      document.write(html);
      document.close();
    } catch (err) {
      loadingEl.classList.remove('visible');
      errorEl.classList.add('visible');
      submitBtn.disabled = false;
      pwdInput.value = '';
      pwdInput.focus();
    }
  });

  pwdInput.addEventListener('keydown', () => {
    errorEl.classList.remove('visible');
  });
})();
</script>

</body>
</html>
